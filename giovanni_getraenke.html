<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">

<meta name="description" content="Getränkekarte des Ristorante Giovanni R in Laatzen – Weine, Bier, Aperitifs, Softdrinks, Säfte und Spirituosen.">
<title>Giovanni R – Getränkekarte</title>
<link rel="icon" href="extra/favicon.png" type="image/png">
<link rel="apple-touch-icon" href="extra/favicon.png">
<link rel="canonical" href="https://giovannir-menu.de/getraenke">
<meta property="og:title" content="Giovanni R – Getränkekarte">
<meta property="og:description" content="Getränkekarte des Ristorante Giovanni R in Laatzen – Weine, Bier, Aperitifs, Softdrinks, Säfte und Spirituosen.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://giovannir-menu.de/getraenke">
<meta property="og:locale" content="de_DE">
<link rel="stylesheet" href="fonts.css">
<link rel="stylesheet" href="style.css">
<style>
/* ── SPOTLIGHT WALKTHROUGH ── */
#wt-overlay { position:fixed; inset:0; z-index:9000; pointer-events:none; opacity:0; transition:opacity 0.5s ease; }
#wt-overlay.active { pointer-events:auto; opacity:1; }
#wt-backdrop {
  position:absolute; inset:0;
  background: radial-gradient(ellipse var(--wt-rw) var(--wt-rh) at var(--wt-x) var(--wt-y), transparent 60%, rgba(8,5,2,0.5) 80%, rgba(8,5,2,0.82) 100%);
  /* no CSS transition — animated via JS rAF instead */
}
#wt-label-text {
  position:absolute; bottom:100px; left:0; right:0; text-align:center;
  font-family:'Playfair Display',serif; font-size:clamp(38px,8vw,74px);
  font-style:italic; color:#f5f0e8; letter-spacing:0.04em;
  text-shadow:0 2px 28px rgba(0,0,0,0.7);
  opacity:0; pointer-events:none;
  transition:opacity 0.25s ease;
}
#wt-overlay.active #wt-label-text.visible { opacity:1; }
#wt-arrow-svg { position:absolute; left:0; top:0; pointer-events:none; overflow:visible; }
#wt-arrow-svg path { stroke:#b8932a; stroke-width:5; stroke-linecap:round; stroke-linejoin:round; fill:none; transition:opacity 0.4s ease; }
#wt-arrow-svg polygon { fill:#b8932a; transition:opacity 0.4s ease; }
</style>
</head>
<body class="getraenke-page">

<!-- SPOTLIGHT WALKTHROUGH -->
<div id="wt-overlay">
  <div id="wt-backdrop"></div>
  <span id="wt-label-text"></span>
  <svg id="wt-arrow-svg">
    <path id="wt-arrow-path" d=""/>
    <polygon id="wt-arrow-head" points=""/>
  </svg>
</div>

<!-- BACK TO TOP -->
<button id="back-to-top" aria-label="Nach oben">&#8593;</button>

<!-- HEADER -->
<header>
  <a href="/" class="header-logo-link">
    <img src="extra/Logo.svg" alt="Ristorante Giovanni R" class="header-logo">
  </a>
  <div class="header-ornament">
    <span></span>
    <i>✦</i>
    <span></span>
  </div>
  <div class="page-tabs">
    <a href="/" class="page-tab" data-tab="speisekarte">Speisekarte</a>
    <a href="/getraenke" class="page-tab page-tab--active" data-tab="getraenke">Getränke</a>
  </div>
  <div class="lang-wrapper">
    <img src="extra/language-regular-full.svg" class="lang-icon" alt="Sprache wählen">
    <div class="lang-arrow"></div>
    <select class="lang-select" id="langSelect" aria-label="Sprache wählen">
      <option value="de">DE</option>
      <option value="en">EN</option>
      <option value="it">IT</option>
      <option value="zh">中文 (Beta)</option>
    </select>
  </div>
</header>

<!-- NAV -->
<nav>
  <a href="#heissgetraenke" data-nav="heissgetraenke">Heiße Getränke</a>
  <a href="#softdrinks" data-nav="softdrinks">Softdrinks</a>
  <a href="#saefte" data-nav="saefte">Säfte</a>
  <a href="#bier" data-nav="bier">Bier</a>
  <a href="#aperitifs" data-nav="aperitifs">Aperitifs</a>

      <h2 data-nav-heading="saefte">Säfte</h2>

<script>
(function() {
  let menuData = null;
  let currentLang = localStorage.getItem('giovanni_lang') || 'de';

  const UI = {
    de: {
      nav: {
        heissgetraenke: 'Heiße Getränke', softdrinks: 'Softdrinks', saefte: 'Säfte',
        bier: 'Bier', aperitifs: 'Aperitifs', spirituosen: 'Spirituosen',
        wein: 'Wein', prosecco: 'Prosecco'
      },
      headings: {
        heissgetraenke: 'Heiße Getränke', softdrinks: 'Softdrinks', saefte: 'Säfte',
        bier: 'Bier', aperitifs: 'Aperitifs & Cocktails', spirituosen: 'Spirituosen',
        wein: 'Wein', prosecco: 'Prosecco'
      },
      drink_labels: {
        heissgetraenke: 'Heiße Getränke', softdrinks: 'Softdrinks', saefte: 'Säfte',
        bier: 'Bier', aperitifs: 'Aperitifs & Cocktails', spirituosen: 'Spirituosen',
        weisswein: 'Weißwein', rotwein: 'Rotwein', rosewein: 'Roséwein',
        prosecco_flasche: 'Prosecco (Flasche)', offen: 'Offen', flasche: 'Flasche'
      },
      back: '← Zur Speisekarte',
      tabs: { speisekarte: 'Speisekarte', getraenke: 'Getränke' }
    },
    en: {
      nav: {
        heissgetraenke: 'Hot Drinks', softdrinks: 'Soft Drinks', saefte: 'Juices',
        bier: 'Beer', aperitifs: 'Aperitifs', spirituosen: 'Spirits',
        wein: 'Wine', prosecco: 'Prosecco'
      },
      headings: {
        heissgetraenke: 'Hot Drinks', softdrinks: 'Soft Drinks', saefte: 'Juices',
        bier: 'Beer', aperitifs: 'Aperitifs & Cocktails', spirituosen: 'Spirits',
        wein: 'Wine', prosecco: 'Prosecco'
      },
      drink_labels: {
        heissgetraenke: 'Hot Drinks', softdrinks: 'Soft Drinks', saefte: 'Juices',
        bier: 'Beer', aperitifs: 'Aperitifs & Cocktails', spirituosen: 'Spirits',
        weisswein: 'White Wine', rotwein: 'Red Wine', rosewein: 'Rosé Wine',
        prosecco_flasche: 'Prosecco (Bottle)', offen: 'By the Glass', flasche: 'Bottle'
      },
      back: '← Back to Menu',
      tabs: { speisekarte: 'Food Menu', getraenke: 'Drinks' }
    },
    it: {
      nav: {
        heissgetraenke: 'Bevande Calde', softdrinks: 'Soft Drink', saefte: 'Succhi',
        bier: 'Birra', aperitifs: 'Aperitivi', spirituosen: 'Superalcolici',
        wein: 'Vino', prosecco: 'Prosecco'
      },
      headings: {
        heissgetraenke: 'Bevande Calde', softdrinks: 'Soft Drink', saefte: 'Succhi',
        bier: 'Birra', aperitifs: 'Aperitivi & Cocktail', spirituosen: 'Superalcolici',
        wein: 'Vino', prosecco: 'Prosecco'
      },
      drink_labels: {
        heissgetraenke: 'Bevande Calde', softdrinks: 'Soft Drink', saefte: 'Succhi',
        bier: 'Birra', aperitifs: 'Aperitivi & Cocktail', spirituosen: 'Superalcolici',
        weisswein: 'Vino Bianco', rotwein: 'Vino Rosso', rosewein: 'Vino Rosato',
        prosecco_flasche: 'Prosecco (Bottiglia)', offen: 'Al Bicchiere', flasche: 'Bottiglia'
      },
      back: '← Torna al Menu',
      tabs: { speisekarte: 'Menu', getraenke: 'Bevande' }
    },
    zh: {
      nav: {
        heissgetraenke: '热饮', softdrinks: '软饮', saefte: '果汁',
        bier: '啤酒', aperitifs: '开胃酒', spirituosen: '烈酒',
        wein: '葡萄酒', prosecco: '普罗塞克'
      },
      headings: {
        heissgetraenke: '热饮', softdrinks: '软饮', saefte: '果汁',
        bier: '啤酒', aperitifs: '开胃酒 & 鸡尾酒', spirituosen: '烈酒',
        wein: '葡萄酒', prosecco: '普罗塞克'
      },
      drink_labels: {
        heissgetraenke: '热饮', softdrinks: '软饮', saefte: '果汁',
        bier: '啤酒', aperitifs: '开胃酒 & 鸡尾酒', spirituosen: '烈酒',
        weisswein: '白葡萄酒', rotwein: '红葡萄酒', rosewein: '玫瑰葡萄酒',
        prosecco_flasche: '普罗塞克（瓶装）', offen: '散杯', flasche: '整瓶'
      },
      back: '← 返回菜单',
      tabs: { speisekarte: '菜单', getraenke: '饮品' }
    }
  };

  function esc(s) {
    return String(s ?? '').replaceAll('&', '&amp;').replaceAll('<', '&lt;').replaceAll('>', '&gt;').replaceAll('"', '&quot;');
  }

  function renderDrinkPrices(item) {
    if (item.preis) return `<span class="drink-price">${esc(item.preis)}</span>`;
    if (item.preise) {
      return Object.entries(item.preise)
        .map(([size, price]) => `<span class="drink-price">${esc(size)} <b>${esc(price)}</b></span>`)
        .join('');
    }
    return '';
  }

  function renderDrinkItem(item) {
    const name = (currentLang !== 'de' && item.translations && item.translations[currentLang])
      ? item.translations[currentLang].name
      : item.name;
    return `
      <div class="drink-item">
        <span class="drink-name">${esc(name)}</span>
        <div class="drink-prices">${renderDrinkPrices(item)}</div>
      </div>`;
  }

  function renderDrinkSubsection(items) {
    return `<div class="drink-list">${items.map(renderDrinkItem).join('')}</div>`;
  }

  function renderWeinSection(g) {
    const ui = UI[currentLang];
    const dl = ui.drink_labels;
    return `
      <div class="drink-subsection" style="margin-bottom:24px">
        <h3 class="drink-subheading">${dl.weisswein}</h3>
        <div class="drink-wine-sub">${dl.offen}</div>
        <div class="drink-list">${g.weisswein.offen.map(renderDrinkItem).join('')}</div>
        <div class="drink-wine-sub">${dl.flasche}</div>
        <div class="drink-list">${g.weisswein.flasche.map(renderDrinkItem).join('')}</div>
      </div>
      <div class="drink-subsection" style="margin-bottom:24px">
        <h3 class="drink-subheading">${dl.rotwein}</h3>
        <div class="drink-wine-sub">${dl.offen}</div>
        <div class="drink-list">${g.rotwein.offen.map(renderDrinkItem).join('')}</div>
        <div class="drink-wine-sub">${dl.flasche}</div>
        <div class="drink-list">${g.rotwein.flasche.map(renderDrinkItem).join('')}</div>
      </div>
      <div class="drink-subsection">
        <h3 class="drink-subheading">${dl.rosewein}</h3>
        <div class="drink-wine-sub">${dl.offen}</div>
        <div class="drink-list">${g.rosewein.offen.map(renderDrinkItem).join('')}</div>
        <div class="drink-wine-sub">${dl.flasche}</div>
        <div class="drink-list">${g.rosewein.flasche.map(renderDrinkItem).join('')}</div>
      </div>`;
  }

  function render() {
    const g = menuData.getraenke;
    const ui = UI[currentLang];

    // Nav labels
    document.querySelectorAll('[data-nav]').forEach(el => {
      const key = el.dataset.nav;
      if (ui.nav[key]) el.textContent = ui.nav[key];
    });

    // Section headings
    document.querySelectorAll('[data-nav-heading]').forEach(el => {
      const key = el.dataset.navHeading;
      if (ui.headings[key]) el.textContent = ui.headings[key];
    });

    // Back link
    const backEl = document.querySelector('[data-back-link]');
    if (backEl) backEl.textContent = ui.back;

    // Tabs
    document.querySelectorAll('[data-tab]').forEach(el => {
      const key = el.dataset.tab;
      if (ui.tabs[key]) el.textContent = ui.tabs[key];
    });

    // Drinks
    const map = {
      heissgetraenke: g.heissgetraenke,
      softdrinks: g.softdrinks,
      saefte: g.saefte,
      bier: g.bier,
      aperitifs: g.aperitifs,
      spirituosen: g.spirituosen,
      prosecco_flasche: g.prosecco_flasche,
    };
    document.querySelectorAll('[data-drink]').forEach(el => {
      const key = el.dataset.drink;
      if (key === 'wein') {
        el.innerHTML = renderWeinSection(g);
      } else if (map[key]) {
        el.innerHTML = renderDrinkSubsection(map[key]);
      }
    });
  }

  // Scroll-based nav highlight
  const navObserver = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      const id = entry.target.id;
      const link = document.querySelector(`nav a[href="#${id}"]`);
      if (!link) return;
      if (entry.isIntersecting) {
        document.querySelectorAll('nav a').forEach(a => a.classList.remove('active'));
        link.classList.add('active');
        link.scrollIntoView({ inline: 'center', block: 'nearest', behavior: 'smooth' });
      }
    });
  }, { rootMargin: '-10% 0px -80% 0px', threshold: 0 });

  document.querySelectorAll('main section[id]').forEach(sec => navObserver.observe(sec));

  fetch('giovanni_r_menu.json')
    .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
    .then(data => {
      menuData = data;
      document.getElementById('langSelect').value = currentLang;
      render();
      document.getElementById('langSelect').addEventListener('change', function() {
        currentLang = this.value;
        document.documentElement.lang = this.value;
        localStorage.setItem('giovanni_lang', this.value);
        render();
      });
    })
    .catch(() => {
      document.querySelector('main').innerHTML = '<p style="text-align:center;padding:80px 24px;font-family:\'EB Garamond\',serif;font-size:1.1rem;color:var(--ink-soft);">Die Getränkekarte konnte leider nicht geladen werden. Bitte versuche es später erneut oder ruf uns an: +49 (0)511 – 84901140</p>';
    });
})();
</script>

<script>
// ── SPOTLIGHT WALKTHROUGH (once only) ──
(function () {
  if (localStorage.getItem('giovanni_wt_done')) return;

  const steps = [
    { selector: '.lang-wrapper',                     label: 'Change Language' },
    { selector: '.page-tab[data-tab="speisekarte"]', label: 'Food Menu' },
    { selector: '.page-tab[data-tab="getraenke"]',   label: 'Drinks Menu' },
  ];

  const STEP_DURATION = 1400;
  const ANIM_DURATION = 300;
  const PAD_X = 28, PAD_Y = 14;

  const overlay  = document.getElementById('wt-overlay');
  const backdrop = document.getElementById('wt-backdrop');
  const labelTxt = document.getElementById('wt-label-text');
  const arrowSvg = document.getElementById('wt-arrow-svg');
  const arrowPth = document.getElementById('wt-arrow-path');
  const arrowHd  = document.getElementById('wt-arrow-head');

  let cur = { cx: 0, cy: 0, rw: 0, rh: 0 };
  let rafId = null;

  function getPos(el) {
    const r = el.getBoundingClientRect();
    return { cx: r.left+r.width/2, cy: r.top+r.height/2, rw: r.width/2+PAD_X, rh: r.height/2+PAD_Y };
  }

  function ease(t) { return t < 0.5 ? 2*t*t : -1+(4-2*t)*t; }

  function animateTo(target) {
    const start = { ...cur };
    const t0 = performance.now();
    cancelAnimationFrame(rafId);
    function frame(now) {
      const p = Math.min((now - t0) / ANIM_DURATION, 1);
      const e = ease(p);
      cur.cx = start.cx + (target.cx - start.cx) * e;
      cur.cy = start.cy + (target.cy - start.cy) * e;
      cur.rw = start.rw + (target.rw - start.rw) * e;
      cur.rh = start.rh + (target.rh - start.rh) * e;
      applySpotlight();
      applyArrow();
      if (p < 1) rafId = requestAnimationFrame(frame);
    }
    rafId = requestAnimationFrame(frame);
  }

  function applySpotlight() {
    const { cx, cy, rw, rh } = cur;
    backdrop.style.setProperty('--wt-x',  cx + 'px');
    backdrop.style.setProperty('--wt-y',  cy + 'px');
    backdrop.style.setProperty('--wt-rw', rw + 'px');
    backdrop.style.setProperty('--wt-rh', rh + 'px');
  }

  function applyArrow() {
    const { cx, cy, rw, rh } = cur;
    const W = window.innerWidth, H = window.innerHeight;
    const ax = cx+rw*0.4, ay = cy+rh+65, bx = cx, by = cy+rh+8;
    const mx = cx+18, my = (ay+by)/2;
    const len = Math.hypot(bx-ax, by-ay);
    const angle = Math.atan2(by-my, bx-mx);
    const hs = 16;
    const hx1 = bx-hs*Math.cos(angle-0.4), hy1 = by-hs*Math.sin(angle-0.4);
    const hx2 = bx-hs*Math.cos(angle+0.4), hy2 = by-hs*Math.sin(angle+0.4);
    arrowSvg.setAttribute('width',W); arrowSvg.setAttribute('height',H);
    arrowSvg.setAttribute('viewBox',`0 0 ${W} ${H}`);
    arrowPth.setAttribute('d',`M${ax} ${ay} Q${mx} ${my} ${bx} ${by}`);
    arrowHd.setAttribute('points',`${bx},${by} ${hx1},${hy1} ${hx2},${hy2}`);
    arrowPth.style.strokeDasharray = len;
    arrowPth.style.strokeDashoffset = '0';
  }

  function crossfadeText(text) {
    labelTxt.style.transition = 'opacity 0.2s ease';
    labelTxt.style.opacity = '0';
    setTimeout(() => { labelTxt.textContent = text; labelTxt.style.opacity = '1'; }, 220);
  }

  function showStep(i) {
    if (i >= steps.length) {
      labelTxt.style.transition = 'opacity 0.5s ease';
      labelTxt.style.opacity = '0';
      arrowPth.style.opacity = '0'; arrowHd.style.opacity = '0';

      setTimeout(() => { overlay.classList.remove('active'); localStorage.setItem('giovanni_wt_done','1'); }, 550);
      return;
    }
    const el = document.querySelector(steps[i].selector);
    if (!el) { showStep(i+1); return; }
    const target = getPos(el);

    if (i === 0) {
      cur = { ...target };
      applySpotlight(); applyArrow();
      labelTxt.textContent = steps[0].label;
      arrowPth.style.opacity = '0'; arrowHd.style.opacity = '0';
      overlay.classList.add('active');
      requestAnimationFrame(() => {

        labelTxt.classList.add('visible');
        setTimeout(() => {
          arrowPth.style.transition = 'opacity 0.4s ease'; arrowPth.style.opacity = '1';
          arrowHd.style.transition  = 'opacity 0.4s ease 0.3s'; arrowHd.style.opacity = '1';
        }, 200);
      });
    } else {
      crossfadeText(steps[i].label);
      animateTo(target);
    }

    setTimeout(() => showStep(i+1), STEP_DURATION);
  }

  overlay.addEventListener('click', () => { overlay.classList.remove('active'); localStorage.setItem('giovanni_wt_done','1'); });
  window.addEventListener('load', () => setTimeout(() => showStep(0), 800));
})();
</script>

<script>
// Back to top button
(function() {
  const btn = document.getElementById('back-to-top');
  window.addEventListener('scroll', () => {
    btn.classList.toggle('visible', window.scrollY > 400);
  }, { passive: true });
  btn.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));
})();
</script>
