<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Tischaufsteller – Giovanni R</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  @page {
    size: A4 portrait;
    margin: 0;
  }

  body {
    width: 210mm;
    height: 297mm;
    background: #f5f0e8;
    font-family: 'Georgia', serif;
    overflow: hidden;
  }

  /* A4 geteilt in zwei Hälften: oben = Vorderseite, unten = Rückseite */
  .panel {
    width: 210mm;
    height: 148.5mm;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 10mm 20mm;
    position: relative;
    background: #f5f0e8;
  }

  /* Faltlinie */
  .fold-line {
    width: 210mm;
    height: 0;
    border-top: 1.5px dashed #c9b99a;
    position: relative;
    text-align: center;
  }
  .fold-line span {
    position: absolute;
    top: -9px;
    left: 50%;
    transform: translateX(-50%);
    background: #f5f0e8;
    padding: 0 8px;
    font-size: 8px;
    color: #b8932a;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    font-family: 'Georgia', serif;
  }

  .logo-wrap {
    margin-bottom: 6mm;
  }

  .divider {
    width: 60mm;
    height: 1px;
    background: linear-gradient(to right, transparent, #b8932a, transparent);
    margin: 4mm auto;
  }

  .tagline {
    font-size: 9px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: #8b3a1e;
    text-align: center;
    margin-bottom: 6mm;
  }

  .qr-wrap {
    margin: 3mm 0;
  }

  .qr-wrap svg {
    width: 52mm;
    height: 52mm;
  }

  .scan-text {
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #5a4a3a;
    text-align: center;
    margin-top: 4mm;
  }

  .url {
    font-size: 9px;
    color: #b8932a;
    letter-spacing: 0.1em;
    text-align: center;
    margin-top: 2mm;
    font-style: italic;
  }

  /* Rückseite ist auf dem Kopf (für Zelt-Aufsteller) */
  .panel-back {
    transform: rotate(180deg);
  }

  .corner-ornament {
    position: absolute;
    font-size: 18px;
    color: #b8932a;
    opacity: 0.3;
    line-height: 1;
  }
  .corner-tl { top: 5mm; left: 7mm; }
  .corner-tr { top: 5mm; right: 7mm; }
  .corner-bl { bottom: 5mm; left: 7mm; }
  .corner-br { bottom: 5mm; right: 7mm; }
</style>
</head>
