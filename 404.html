<!DOCTYPE html>

<link rel="icon" href="extra/favicon.png" type="image/png">

<style>
  .error-wrap {
    max-width: 680px;
    margin: 80px auto 80px;
    padding: 0 24px;
    position: relative;
    z-index: 1;
    text-align: center;
  }

  .error-wrap .error-code {
    font-family: 'Playfair Display', serif;
    font-size: 5rem;
    color: var(--gold);
    letter-spacing: 0.08em;
    line-height: 1;
    margin-bottom: 16px;
    opacity: 0.6;
  }

  .error-wrap h1 {
    font-family: 'Playfair Display', serif;
    font-size: 1.8rem;
    color: var(--gold);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .error-wrap .divider-line {
    width: 48px;
    height: 2px;
    background: var(--gold);
    margin: 0 auto 32px;
  }

  .error-wrap p {
    font-family: 'EB Garamond', serif;
    font-size: 1.1rem;
    line-height: 1.8;
    color: var(--ink-soft);
    margin-bottom: 40px;
  }

  .back-link {
    display: inline-block;
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.8rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--ink-soft);
    text-decoration: none;
    border-bottom: 1px solid var(--divider);
    padding-bottom: 2px;
    transition: color 0.2s, border-color 0.2s;
  }

  .back-link:hover {
    color: var(--gold);
    border-color: var(--gold);
  }

  .back-link::before {
    content: '← ';
  }
</style>
